<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title — shows in browser tab and Google results -->
    <title>DevClarity — AI Code Analysis for Developers</title>

    <!-- Meta description — shows in Google search results -->
    <meta
      name="description"
      content="Paste your code and get instant AI feedback. Quality score, issue detection, and improvement suggestions for JavaScript, TypeScript, and Python."
    />

    <!-- Open Graph — controls how the link looks when shared on LinkedIn/Twitter -->
    <meta property="og:title" content="DevClarity — AI Code Analysis" />
    <meta
      property="og:description"
      content="Get instant AI feedback on your code. Quality scores, issue detection, and improvement suggestions."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://dev-clarity-mvp-project-ai-assistan.vercel.app"
    />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DevClarity — AI Code Analysis" />
    <meta
      name="twitter:description"
      content="Paste your code. Get instant AI feedback. Free."
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
